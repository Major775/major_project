<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>ONG Project Pro — v3.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <style>
    /* (styles inchangés) */
    :root {
      --bg: #0F172A;
      --bg2: #1E293B;
      --bg3: #162033;
      --sidebar: #0A1628;
      --text: #E2E8F0;
      --text2: #94A3B8;
      --text3: #475569;
      --border: rgba(255, 255, 255, 0.07);
      --border2: rgba(255, 255, 255, 0.12);
      --accent: #6366F1;
      --accent2: #818CF8;
      --accentbg: rgba(99, 102, 241, 0.15);
      --green: #10B981;
      --greenbg: rgba(16, 185, 129, 0.15);
      --red: #EF4444;
      --redbg: rgba(239, 68, 68, 0.15);
      --yellow: #F59E0B;
      --yellowbg: rgba(245, 158, 11, 0.15);
      --blue: #3B82F6;
      --bluebg: rgba(59, 130, 246, 0.15);
      --orange: #F97316;
      --orangebg: rgba(249, 115, 22, 0.15);
      --purple: #A855F7;
      --purplebg: rgba(168, 85, 247, 0.15);
      --radius: 10px;
      --radius2: 14px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    body.light {
      --bg: #F8FAFC;
      --bg2: #FFFFFF;
      --bg3: #F1F5F9;
      --sidebar: #FFFFFF;
      --text: #1E293B;
      --text2: #64748B;
      --text3: #94A3B8;
      --border: rgba(0, 0, 0, 0.06);
      --border2: rgba(0, 0, 0, 0.1);
      --accent: #4F46E5;
      --accent2: #6366F1;
      --accentbg: rgba(79, 70, 229, 0.08);
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    /* ... tout le reste du CSS est identique à l'original ... */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      font-size: 13px;
      scroll-behavior: smooth
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden
    }

    ::-webkit-scrollbar {
      width: 5px;
      height: 5px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px
    }

    body.light ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.12)
    }

    .shell {
      display: flex;
      min-height: 100vh
    }

    .sb {
      width: 220px;
      min-width: 220px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 200;
      overflow-y: auto;
      transition: transform .3s
    }

    .sb-logo {
      padding: 16px 14px;
      display: flex;
      align-items: center;
      gap: 9px;
      border-bottom: 1px solid var(--border)
    }

    .sb-mark {
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, #4F46E5, #818CF8);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      color: #fff;
      flex-shrink: 0
    }

    .sb-name {
      font-weight: 700;
      font-size: 14px;
      color: var(--text)
    }

    .sb-tag {
      font-size: 9px;
      color: var(--text3);
      font-weight: 500;
      letter-spacing: .5px
    }

    .sb-section {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      color: var(--text3);
      padding: 14px 14px 4px
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      width: 100%;
      padding: 8px 14px;
      background: none;
      border: none;
      border-left: 3px solid transparent;
      color: var(--text2);
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      text-align: left;
      white-space: nowrap
    }

    .nav-btn i {
      width: 15px;
      text-align: center;
      font-size: 12px;
      flex-shrink: 0
    }

    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text)
    }

    .nav-btn.active {
      background: var(--accentbg);
      color: var(--accent2);
      border-left-color: var(--accent)
    }

    .nav-badge {
      margin-left: auto;
      background: var(--redbg);
      color: var(--red);
      border-radius: 10px;
      padding: 1px 6px;
      font-size: 9px;
      font-weight: 700
    }

    .sb-bottom {
      margin-top: auto;
      padding: 12px;
      border-top: 1px solid var(--border)
    }

    .main {
      margin-left: 220px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh
    }

    .topbar {
      background: var(--sidebar);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100
    }

    .tb-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text)
    }

    .tb-space {
      flex: 1
    }

    .page {
      display: none;
      padding: 20px;
      min-height: calc(100vh - 52px)
    }

    .page.active {
      display: block
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius2);
      overflow: hidden;
      margin-bottom: 16px
    }

    .card-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px
    }

    .card-title {
      font-size: 12.5px;
      font-weight: 700;
      color: var(--text);
      flex: 1
    }

    .card-body {
      padding: 16px
    }

    .g4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px
    }

    .g3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 16px
    }

    .g2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px
    }

    .stat {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius2);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color .2s
    }

    .stat:hover {
      border-color: var(--accent)
    }

    .stat-ico {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0
    }

    .stat-val {
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
      color: var(--text)
    }

    .stat-lbl {
      font-size: 10.5px;
      color: var(--text3);
      margin-top: 3px
    }

    .stat-delta {
      font-size: 10px;
      font-weight: 600;
      margin-top: 4px
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      text-decoration: none
    }

    .btn-primary {
      background: linear-gradient(135deg, #4F46E5, #818CF8);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 2px 8px rgba(79, 70, 229, .35)
    }

    .btn-primary:hover {
      opacity: .9;
      transform: translateY(-1px)
    }

    .btn-ghost {
      background: transparent;
      color: var(--text2)
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text)
    }

    .btn-sm {
      padding: 5px 10px;
      font-size: 11px
    }

    .btn-icon {
      width: 30px;
      height: 30px;
      padding: 0;
      justify-content: center;
      border-radius: 8px
    }

    .btn-success {
      background: var(--greenbg);
      color: var(--green);
      border-color: transparent
    }

    .btn-danger {
      background: var(--redbg);
      color: var(--red);
      border-color: transparent
    }

    .btn-warn {
      background: var(--yellowbg);
      color: var(--yellow);
      border-color: transparent
    }

    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .3px
    }

    .b-green {
      background: var(--greenbg);
      color: var(--green)
    }

    .b-red {
      background: var(--redbg);
      color: var(--red)
    }

    .b-yellow {
      background: var(--yellowbg);
      color: var(--yellow)
    }

    .b-blue {
      background: var(--bluebg);
      color: var(--blue)
    }

    .b-purple {
      background: var(--purplebg);
      color: var(--purple)
    }

    .b-gray {
      background: rgba(148, 163, 184, .15);
      color: var(--text2)
    }

    input,
    select,
    textarea {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      padding: 8px 11px;
      width: 100%;
      transition: border-color .15s;
      outline: none
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, .18)
    }

    input:disabled {
      opacity: .6;
      cursor: not-allowed
    }

    .fld {
      margin-bottom: 11px
    }

    .fld-lbl {
      font-size: 10px;
      font-weight: 700;
      color: var(--text3);
      margin-bottom: 4px;
      display: block;
      text-transform: uppercase;
      letter-spacing: .5px
    }

    .prog-track {
      height: 5px;
      background: rgba(255, 255, 255, .07);
      border-radius: 3px;
      overflow: hidden
    }

    .prog-fill {
      height: 100%;
      border-radius: 3px;
      transition: width .4s
    }

    .prog-lg {
      height: 8px
    }

    table.dataTable thead th {
      background: var(--bg3) !important;
      border-bottom: 1px solid var(--border) !important;
      font-weight: 700;
      font-size: 9.5px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text3) !important;
      padding: 9px 11px !important
    }

    table.dataTable tbody td {
      padding: 9px 11px !important;
      border-bottom: 1px solid var(--border) !important;
      vertical-align: middle !important;
      color: var(--text);
      background: var(--bg2) !important;
      font-size: 12px
    }

    table.dataTable tbody tr:hover td {
      background: var(--bg3) !important;
      cursor: pointer
    }

    .dataTables_wrapper .dataTables_filter input {
      background: var(--bg3) !important;
      border: 1px solid var(--border2) !important;
      color: var(--text) !important;
      border-radius: 8px !important;
      padding: 5px 10px !important
    }

    .dataTables_wrapper .dataTables_info,
    .dataTables_wrapper .dataTables_paginate {
      font-size: 11px;
      color: var(--text2)
    }

    .dataTables_wrapper .dataTables_paginate .paginate_button {
      border-radius: 6px !important;
      color: var(--text2) !important;
      background: transparent !important;
      border: none !important
    }

    .dataTables_wrapper .dataTables_paginate .paginate_button.current {
      background: var(--accentbg) !important;
      color: var(--accent2) !important;
      border: 1px solid var(--accent) !important
    }

    .gantt-wrap {
      overflow: auto;
      border-radius: var(--radius2);
      background: var(--bg2);
      border: 1px solid var(--border)
    }

    .gantt-table {
      min-width: 900px;
      border-collapse: collapse;
      width: 100%
    }

    .gantt-table th {
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      padding: 7px 10px;
      font-size: 9.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text3);
      white-space: nowrap
    }

    .gantt-table td {
      border-bottom: 1px solid var(--border);
      padding: 6px 10px;
      font-size: 11.5px;
      color: var(--text2);
      vertical-align: middle;
      white-space: nowrap
    }

    .gantt-table tr:hover td {
      background: var(--bg3);
      cursor: pointer
    }

    .gantt-bar {
      height: 18px;
      border-radius: 4px;
      position: relative;
      min-width: 4px
    }

    .gantt-prog {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      border-radius: 4px;
      opacity: .8
    }

    .gantt-today-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: #818CF8;
      z-index: 10;
      pointer-events: none
    }

    .alert-item {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      padding: 11px 14px;
      border-radius: var(--radius);
      margin-bottom: 8px;
      transition: opacity .2s
    }

    .alert-item.error {
      background: var(--redbg);
      border: 1px solid rgba(239, 68, 68, .2)
    }

    .alert-item.warn {
      background: var(--yellowbg);
      border: 1px solid rgba(245, 158, 11, .2)
    }

    .alert-item.info {
      background: var(--bluebg);
      border: 1px solid rgba(59, 130, 246, .2)
    }

    .alert-ico {
      font-size: 13px;
      margin-top: 1px
    }

    .alert-item.error .alert-ico {
      color: var(--red)
    }

    .alert-item.warn .alert-ico {
      color: var(--yellow)
    }

    .alert-item.info .alert-ico {
      color: var(--blue)
    }

    .alert-text {
      flex: 1
    }

    .alert-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px
    }

    .alert-sub {
      font-size: 11px;
      color: var(--text2)
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .65);
      z-index: 500;
      align-items: center;
      justify-content: center
    }

    .modal-overlay.open {
      display: flex
    }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 16px;
      width: 700px;
      max-width: 95vw;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow)
    }

    .modal-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg2);
      z-index: 1
    }

    .modal-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text)
    }

    .modal-body {
      padding: 20px
    }

    .modal-foot {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      position: sticky;
      bottom: 0;
      background: var(--bg2)
    }

    .chart-container {
      position: relative;
      width: 100%
    }

    .kanban-board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px
    }

    .kanban-col {
      background: var(--bg3);
      border-radius: var(--radius2);
      padding: 12px
    }

    .kanban-col-head {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--text3);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .kanban-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color .15s
    }

    .kanban-card:hover {
      border-color: var(--accent)
    }

    .kanban-card-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 5px
    }

    .kanban-card-meta {
      font-size: 10.5px;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap
    }

    .heatmap-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 28px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s
    }

    .heatmap-cell:hover {
      transform: scale(1.1);
      z-index: 1
    }

    .empty {
      text-align: center;
      padding: 36px;
      color: var(--text3)
    }

    .empty i {
      font-size: 28px;
      display: block;
      margin-bottom: 10px;
      opacity: .4
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 7px;
      background: var(--accentbg);
      border: 1px solid var(--accent);
      border-radius: 8px;
      font-size: 10px;
      color: var(--accent2);
      margin: 2px
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 10.5px;
      font-weight: 600
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text)
    }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 10px;
      color: #fff;
      flex-shrink: 0
    }

    .fbar {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-bottom: 14px;
      padding: 12px 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius2)
    }

    .fbar input,
    .fbar select {
      width: auto;
      min-width: 120px
    }

    .notif {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none
    }

    .notif-item {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      box-shadow: var(--shadow);
      pointer-events: auto;
      animation: slideIn .3s ease;
      display: flex;
      align-items: center;
      gap: 8px
    }

    @keyframes slideIn {
      from {
        transform: translateX(100px);
        opacity: 0
      }

      to {
        transform: translateX(0);
        opacity: 1
      }
    }

    @media(max-width:800px) {
      .sb {
        transform: translateX(-100%)
      }

      .main {
        margin-left: 0
      }

      .g4 {
        grid-template-columns: repeat(2, 1fr)
      }

      .kanban-board {
        grid-template-columns: 1fr 1fr
      }
    }

    .doc-preview {
      max-width: 80px;
      max-height: 80px;
      border-radius: 4px;
      object-fit: cover;
      margin-right: 10px;
      border: 1px solid var(--border);
    }
  </style>
</head>

<body>
  <div class="shell">
    <!-- SIDEBAR -->
    <aside class="sb">
      <div class="sb-logo">
        <div class="sb-mark">P</div>
        <div>
          <div class="sb-name">ONG Project Pro</div>
          <div class="sb-tag">v3.0 — Humanitaire</div>
        </div>
      </div>
      <div class="sb-section">Principal</div>
      <button class="nav-btn active" data-p="accueil"><i class="fas fa-home"></i> Tableau de bord</button>
      <button class="nav-btn" data-p="saisie"><i class="fas fa-plus-circle"></i> Nouvelle activité</button>
      <button class="nav-btn" data-p="bdd"><i class="fas fa-database"></i> Base de données</button>
      <button class="nav-btn" data-p="projets"><i class="fas fa-folder-tree"></i> Projets</button>
      <div class="sb-section">Planification</div>
      <button class="nav-btn" data-p="gantt"><i class="fas fa-stream"></i> Diagramme de Gantt</button>
      <button class="nav-btn" data-p="kanban"><i class="fas fa-columns"></i> Vue Kanban</button>
      <button class="nav-btn" data-p="ressources"><i class="fas fa-users"></i> Ressources humaines</button>
      <div class="sb-section">Analyse</div>
      <button class="nav-btn" data-p="tableau"><i class="fas fa-chart-pie"></i> Analytics</button>
      <button class="nav-btn" data-p="alertes"><i class="fas fa-bell"></i> Alertes <span class="nav-badge"
          id="badge-nb">0</span></button>
      <button class="nav-btn" data-p="budget"><i class="fas fa-wallet"></i> Budget</button>
      <div class="sb-section">Documents</div>
      <button class="nav-btn" data-p="docs"><i class="fas fa-file-alt"></i> Documents</button>
      <div class="sb-bottom">
        <select id="theme-sel" style="width:100%">
          <option value="dark">🌙 Sombre</option>
          <option value="light">☀️ Clair</option>
        </select>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <header class="topbar">
        <span class="tb-title" id="top-title">Tableau de bord</span>
        <div class="tb-space"></div>
        <div class="btn-group">
          <span id="top-badge"
            style="display:none;background:var(--redbg);border:1px solid rgba(239,68,68,.3);border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;color:var(--red);cursor:pointer"
            onclick="go('alertes')">
            <i class="fas fa-bell" style="margin-right:3px"></i><span id="top-badge-n">0</span> retard(s)
          </span>
          <button class="btn btn-ghost btn-sm" onclick="exportCSV()"><i class="fas fa-download"></i> Export CSV</button>
          <button class="btn btn-primary btn-sm" onclick="go('saisie');selectedAct=null;refreshCurrentPage()"><i
              class="fas fa-plus"></i> Nouvelle activité</button>
        </div>
      </header>

      <div id="page-accueil" class="page active"></div>
      <div id="page-saisie" class="page"></div>
      <div id="page-bdd" class="page"></div>
      <div id="page-projets" class="page"></div>
      <div id="page-gantt" class="page"></div>
      <div id="page-kanban" class="page"></div>
      <div id="page-ressources" class="page"></div>
      <div id="page-tableau" class="page"></div>
      <div id="page-alertes" class="page"></div>
      <div id="page-budget" class="page"></div>
      <div id="page-docs" class="page"></div>
    </main>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-box">
      <div class="modal-head">
        <span class="modal-title" id="modal-title">Détails</span>
        <button class="btn btn-ghost btn-icon" onclick="closeModal()"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-foot" id="modal-foot"></div>
    </div>
  </div>

  <!-- NOTIFICATIONS -->
  <div class="notif" id="notif-zone"></div>

  <script>
    // ============================
    // STORAGE & DATA
    // ============================
    const KEY = 'ong_pro_v3';
    function loadDB() {
      const s = localStorage.getItem(KEY);
      if (s) return JSON.parse(s);
      const today = new Date();
      const d = (offset) => { const x = new Date(today); x.setDate(x.getDate() + offset); return x.toISOString().slice(0, 10) };
      return {
        projets: [
          { id: 1, nom: 'Projet Eau Potable', desc: 'Accès eau potable zone rurale', debut: '2026-01-01', fin: '2026-12-31', bprev: 50000, breel: 32000, statut: 'En cours', couleur: '#3B82F6', chef: 'Marie Dupont', pays: 'Mali' },
          { id: 2, nom: 'Éducation pour tous', desc: 'Construction écoles primaires', debut: '2026-02-01', fin: '2026-11-30', bprev: 80000, breel: 45000, statut: 'En préparation', couleur: '#10B981', chef: 'Jean Traoré', pays: 'Niger' },
          { id: 3, nom: 'Santé Maternelle', desc: 'Réduction mortalité maternelle', debut: '2026-03-01', fin: '2026-12-31', bprev: 35000, breel: 8000, statut: 'En cours', couleur: '#F59E0B', chef: 'Aminata Sy', pays: 'Sénégal' }
        ],
        activites: [
          { id: 1, pid: 1, nom: 'Forage de puits', resp: 'Marie Dupont', prio: 'Élevée', nbt: 5, tc: 3, bprev: 15000, breel: 12000, statut: 'En cours', dp: '2026-03-01', fp: d(-5), dr: '2026-03-10', fr: null, notes: '3 puits forés sur 5', tags: 'terrain,eau', deps: [], progress: 60 },
          { id: 2, pid: 1, nom: 'Distribution de filtres', resp: 'Paul Kouassi', prio: 'Moyenne', nbt: 2, tc: 2, bprev: 5000, breel: 4800, statut: 'Terminée', dp: '2026-01-15', fp: '2026-02-15', dr: '2026-01-20', fr: '2026-02-10', notes: '', tags: '', deps: [], progress: 100 },
          { id: 3, pid: 2, nom: 'Construction école primaire', resp: 'Jean Traoré', prio: 'Critique', nbt: 8, tc: 0, bprev: 40000, breel: 0, statut: 'Non démarrée', dp: d(5), fp: d(90), dr: null, fr: null, notes: '', tags: 'construction', deps: [], progress: 0 },
          { id: 4, pid: 2, nom: 'Formation enseignants', resp: 'Aminata Sy', prio: 'Élevée', nbt: 4, tc: 0, bprev: 8000, breel: 0, statut: 'Non démarrée', dp: d(95), fp: d(130), dr: null, fr: null, notes: '', tags: 'formation', deps: [3], progress: 0 },
          { id: 5, pid: 3, nom: 'Recrutement sages-femmes', resp: 'Dr. Fatouma', prio: 'Critique', nbt: 3, tc: 1, bprev: 12000, breel: 3000, statut: 'En cours', dp: d(-30), fp: d(-1), dr: d(-28), fr: null, notes: 'Retard recrutement zone rurale', tags: 'rh,santé', deps: [], progress: 33 },
          { id: 6, pid: 3, nom: 'Équipement maternités', resp: 'Marie Dupont', prio: 'Élevée', nbt: 6, tc: 2, bprev: 18000, breel: 5000, statut: 'En cours', dp: d(-10), fp: d(20), dr: d(-8), fr: null, notes: '', tags: 'matériel', deps: [], progress: 33 },
          { id: 7, pid: 1, nom: 'Sensibilisation hygiène', resp: 'Paul Kouassi', prio: 'Faible', nbt: 4, tc: 4, bprev: 3000, breel: 2800, statut: 'Terminée', dp: '2026-04-01', fp: '2026-05-15', dr: '2026-04-05', fr: '2026-05-10', notes: '', tags: 'sensibilisation', deps: [2], progress: 100 },
          { id: 8, pid: 2, nom: 'Achat matériaux construction', resp: 'Jean Traoré', prio: 'Critique', nbt: 1, tc: 0, bprev: 25000, breel: 0, statut: 'Suspendue', dp: d(-20), fp: d(10), dr: null, fr: null, notes: 'En attente financement', tags: 'logistique', deps: [], progress: 0 }
        ],
        documents: [],
        ressources: [] // initialisation du tableau des ressources
      };
    }
    const DB = loadDB();
    function save() { localStorage.setItem(KEY, JSON.stringify(DB)) }

    // ============================
    // STATE
    // ============================
    let cur = 'accueil', selectedAct = null;
    const TODAY = new Date(); TODAY.setHours(0, 0, 0, 0);

    // ============================
    // UTILITIES
    // ============================
    const pName = (id) => { const p = DB.projets.find(x => x.id == id); return p ? p.nom : '—' };
    const pById = (id) => DB.projets.find(x => x.id == id);
    const maxId = (arr) => arr.length ? Math.max(...arr.map(x => x.id)) + 1 : 1;
    const fd = (d) => { if (!d) return '—'; return new Date(d + 'T00:00:00').toLocaleDateString('fr-FR') };
    const fe = (v) => parseFloat(v || 0).toLocaleString('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });
    const pct = (a, b) => b > 0 ? Math.round(a / b * 100) : 0;
    const retards = () => DB.activites.filter(a => a.statut !== 'Terminée' && a.fp && new Date(a.fp) < TODAY);
    const daysLeft = (d) => Math.ceil((new Date(d) - TODAY) / 86400000);
    const daysLate = (d) => Math.floor((TODAY - new Date(d)) / 86400000);
    const statusColor = (s) => ({ Terminée: 'b-green', 'En cours': 'b-blue', 'Non démarrée': 'b-gray', Suspendue: 'b-yellow' }[s] || 'b-gray');
    const prioColor = (p) => ({ Critique: 'b-red', Élevée: 'b-yellow', Moyenne: 'b-blue', Faible: 'b-gray' }[p] || 'b-gray');
    const avatarColor = (name) => { const colors = ['#6366F1', '#10B981', '#F59E0B', '#EF4444', '#3B82F6', '#A855F7', '#EC4899']; const i = name.charCodeAt(0) % colors.length; return colors[i] };
    function autoStatut(nbt, tc) { if (tc >= nbt) return 'Terminée'; if (tc > 0) return 'En cours'; return 'Non démarrée'; }

    function updateBadges() {
      const n = retards().length;
      document.getElementById('badge-nb').textContent = n;
      document.getElementById('top-badge').style.display = n > 0 ? 'flex' : 'none';
      document.getElementById('top-badge-n').textContent = n;
    }

    function notify(msg, type = 'success') {
      const z = document.getElementById('notif-zone');
      const ic = { success: 'check-circle', error: 'exclamation-circle', info: 'info-circle' }[type] || 'check-circle';
      const col = { success: 'var(--green)', error: 'var(--red)', info: 'var(--blue)' }[type] || 'var(--green)';
      const div = document.createElement('div'); div.className = 'notif-item';
      div.innerHTML = `<i class="fas fa-${ic}" style="color:${col}"></i>${msg}`;
      z.appendChild(div); setTimeout(() => div.remove(), 3000);
    }

    // ============================
    // NAVIGATION
    // ============================
    function go(p) {
      document.querySelectorAll('.nav-btn[data-p]').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
      const btn = document.querySelector(`.nav-btn[data-p="${p}"]`);
      const pg = document.getElementById('page-' + p);
      if (btn) btn.classList.add('active');
      if (pg) pg.classList.add('active');
      cur = p;
      const titles = { accueil: 'Tableau de bord', saisie: 'Nouvelle activité', bdd: 'Base de données', projets: 'Gestion des projets', gantt: 'Diagramme de Gantt', kanban: 'Vue Kanban', ressources: 'Ressources humaines', tableau: 'Analytics & KPIs', alertes: 'Alertes & Retards', budget: 'Suivi budgétaire', docs: 'Documents & Rapports' };
      document.getElementById('top-title').textContent = titles[p] || p;
      updateBadges();
      refreshCurrentPage();
    }
    function refreshCurrentPage() {
      const c = document.getElementById('page-' + cur);
      if (!c) return;
      ({ accueil: buildAccueil, saisie: buildSaisie, bdd: buildBDD, projets: buildProjets, gantt: buildGantt, kanban: buildKanban, ressources: buildRessources, tableau: buildTableau, alertes: buildAlertes, budget: buildBudget, docs: buildDocs }[cur] || (() => { }))(c);
    }

    // ============================
    // MODAL
    // ============================
    function openModal(title, body, foot = '') {
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-body').innerHTML = body;
      document.getElementById('modal-foot').innerHTML = foot;
      document.getElementById('modal-overlay').classList.add('open');
    }
    function closeModal() { document.getElementById('modal-overlay').classList.remove('open') }

    // ============================
    // EXPORT CSV
    // ============================
    function exportCSV() {
      let csv = 'ID;Projet;Activité;Responsable;Priorité;Statut;Avancement;Budget Prévu;Budget Réel\n';
      DB.activites.forEach(a => csv += `${a.id};${pName(a.pid)};${a.nom};${a.resp};${a.prio};${a.statut};${pct(a.tc, a.nbt)}%;${a.bprev};${a.breel}\n`);
      const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
      const l = document.createElement('a'); l.href = URL.createObjectURL(blob); l.download = 'activites_ong.csv'; l.click();
      notify('Export CSV téléchargé', 'success');
    }

    // ============================
    // PAGE ACCUEIL (inchangée)
    // ============================
    function buildAccueil(c) {
      const total = DB.activites.length;
      const termine = DB.activites.filter(a => a.statut === 'Terminée').length;
      const enCours = DB.activites.filter(a => a.statut === 'En cours').length;
      const ret = retards().length;
      const bPrev = DB.activites.reduce((s, a) => s + (a.bprev || 0), 0);
      const bReel = DB.activites.reduce((s, a) => s + (a.breel || 0), 0);
      const avG = total ? Math.round(DB.activites.reduce((s, a) => s + pct(a.tc, a.nbt), 0) / total) : 0;

      c.innerHTML = `
  <div class="section-head">
    <div><div class="section-title">Vue d'ensemble du programme</div><div style="color:var(--text3);font-size:11px;margin-top:3px">${DB.projets.length} projets actifs — Mis à jour le ${new Date().toLocaleDateString('fr-FR')}</div></div>
  </div>
  <div class="g4">
    <div class="stat" onclick="go('bdd')"><div class="stat-ico" style="background:var(--accentbg);color:var(--accent2)"><i class="fas fa-list-check"></i></div><div><div class="stat-val">${total}</div><div class="stat-lbl">Total activités</div><div class="stat-delta" style="color:var(--green)">${termine} terminées</div></div></div>
    <div class="stat" onclick="go('tableau')"><div class="stat-ico" style="background:var(--bluebg);color:var(--blue)"><i class="fas fa-chart-line"></i></div><div><div class="stat-val">${avG}%</div><div class="stat-lbl">Avancement global</div><div class="stat-delta" style="color:var(--blue)">${enCours} en cours</div></div></div>
    <div class="stat" onclick="go('budget')"><div class="stat-ico" style="background:var(--greenbg);color:var(--green)"><i class="fas fa-coins"></i></div><div><div class="stat-val">${pct(bReel, bPrev)}%</div><div class="stat-lbl">Budget exécuté</div><div class="stat-delta" style="color:var(--text3)">${fe(bReel)} / ${fe(bPrev)}</div></div></div>
    <div class="stat" onclick="go('alertes')"><div class="stat-ico" style="background:${ret > 0 ? 'var(--redbg)' : 'var(--greenbg)'};color:${ret > 0 ? 'var(--red)' : 'var(--green)'}"><i class="fas fa-${ret > 0 ? 'exclamation-triangle' : 'check-circle'}"></i></div><div><div class="stat-val" style="color:${ret > 0 ? 'var(--red)' : 'var(--green)'}">${ret}</div><div class="stat-lbl">En retard</div><div class="stat-delta" style="color:var(--text3)">${DB.documents.length} documents</div></div></div>
  </div>
  <div class="g2" style="margin-bottom:16px">
    <div class="card">
      <div class="card-head"><span class="card-title"><i class="fas fa-folder-tree" style="color:var(--accent2);margin-right:6px"></i>Projets</span><button class="btn btn-ghost btn-sm" onclick="go('projets')">Voir tout <i class="fas fa-arrow-right"></i></button></div>
      <div class="card-body">
        ${DB.projets.map(p => {
        const acts = DB.activites.filter(a => a.pid == p.id);
        const av = acts.length ? Math.round(acts.reduce((s, a) => s + pct(a.tc, a.nbt), 0) / acts.length) : 0;
        return `<div style="margin-bottom:12px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
              <div style="display:flex;align-items:center;gap:7px"><div style="width:10px;height:10px;border-radius:50%;background:${p.couleur};flex-shrink:0"></div><span style="font-size:12px;font-weight:600;color:var(--text)">${p.nom}</span></div>
              <div style="display:flex;align-items:center;gap:8px"><span style="font-size:10.5px;color:var(--text3)">${acts.length} act.</span><span style="font-size:11px;font-weight:700;color:${p.couleur}">${av}%</span></div>
            </div>
            <div class="prog-track prog-lg"><div class="prog-fill" style="width:${av}%;background:${p.couleur}"></div></div>
            <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:var(--text3)"><span>${p.chef}</span><span>${p.pays}</span></div>
          </div>`;
      }).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title"><i class="fas fa-file-alt" style="color:var(--accent2);margin-right:6px"></i>Documents récents</span><button class="btn btn-ghost btn-sm" onclick="go('docs')">Voir tout <i class="fas fa-arrow-right"></i></button></div>
      <div class="card-body">
        ${DB.documents.slice(-5).reverse().map(d => `
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:6px 0;border-bottom:1px solid var(--border)">
            <i class="fas ${d.fileType && d.fileType.startsWith('image/') ? 'fa-image' : 'fa-file'}" style="color:var(--accent2);width:20px"></i>
            <div style="flex:1"><div style="font-size:12px;font-weight:600">${d.nom}</div><div style="font-size:10px;color:var(--text3)">${d.projet} · ${d.activite || '—'} · ${fd(d.date)}</div></div>
            <span class="badge ${d.fileType && d.fileType.startsWith('image/') ? 'b-purple' : 'b-blue'}">${d.fileType && d.fileType.startsWith('image/') ? 'Image' : 'Document'}</span>
          </div>
        `).join('') || '<div class="empty" style="padding:20px"><i class="fas fa-file-alt"></i>Aucun document</div>'}
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-head"><span class="card-title"><i class="fas fa-exclamation-circle" style="color:var(--red);margin-right:6px"></i>Alertes prioritaires</span></div>
    <div class="card-body">
      ${retards().slice(0, 4).map(a => `
        <div class="alert-item error" onclick="go('saisie');selectedAct=DB.activites.find(x=>x.id==${a.id});refreshCurrentPage()">
          <i class="fas fa-exclamation-circle alert-ico"></i>
          <div class="alert-text"><div class="alert-title">${a.nom} — ${pName(a.pid)}</div><div class="alert-sub">Fin prévue: ${fd(a.fp)} — <strong>${daysLate(a.fp)} jours de retard</strong></div></div>
          <span class="badge b-red">${a.prio}</span>
        </div>`).join('') || '<div class="empty"><i class="fas fa-check-circle"></i>Aucun retard — Programme à jour !</div>'}
    </div>
  </div>`;
    }

    // ============================
    // PAGE SAISIE (inchangée)
    // ============================
    function buildSaisie(c) {
      const a = selectedAct;
      c.innerHTML = `
  <div class="card">
    <div class="card-head">
      <span class="card-title">${a ? '<i class="fas fa-edit" style="color:var(--yellow);margin-right:6px"></i>Modifier l\'activité' : '<i class="fas fa-plus-circle" style="color:var(--green);margin-right:6px"></i>Nouvelle activité'}</span>
      ${a ? `<span class="badge ${statusColor(a.statut)}">${a.statut}</span>` : ''}
    </div>
    <div class="card-body">
      <div class="g2">
        <div>
          <div class="fld"><label class="fld-lbl">N° activité</label><input id="s-id" value="${a ? a.id : maxId(DB.activites)}" disabled></div>
          <div class="fld"><label class="fld-lbl">Projet *</label><select id="s-pid">${DB.projets.map(p => `<option value="${p.id}" ${a && a.pid == p.id ? 'selected' : ''}>${p.nom}</option>`).join('')}</select></div>
          <div class="fld"><label class="fld-lbl">Nom de l'activité *</label><input id="s-nom" value="${a ? a.nom : ''}" placeholder="Ex: Forage de puits zone nord"></div>
          <div class="fld"><label class="fld-lbl">Responsable *</label><select id="s-resp">${DB.ressources.map(r => `<option ${a && a.resp == r.nom ? 'selected' : ''}>${r.nom}</option>`).join('')}<option ${a && !DB.ressources.find(r => r.nom == a?.resp) ? 'selected' : ''}>Autre</option></select></div>
          <div style="display:flex;gap:10px">
            <div class="fld" style="flex:1"><label class="fld-lbl">Priorité</label><select id="s-prio"><option>Faible</option><option>Moyenne</option><option>Élevée</option><option>Critique</option></select></div>
            <div class="fld" style="flex:1"><label class="fld-lbl">Statut (auto)</label><input id="s-statut" value="${a ? a.statut : 'Non démarrée'}" disabled></div>
          </div>
          <div class="fld"><label class="fld-lbl">Tags (virgule)</label><input id="s-tags" value="${a ? a.tags || '' : ''}" placeholder="terrain, eau, logistique..."></div>
          <div class="fld"><label class="fld-lbl">Dépendances (IDs activités)</label><input id="s-deps" value="${a ? (a.deps || []).join(',') : ''}" placeholder="Ex: 1,3"></div>
        </div>
        <div>
          <div class="fld"><label class="fld-lbl">Dates prévues</label><div style="display:flex;gap:8px"><input type="date" id="s-dp" value="${a ? a.dp || '' : ''}"><input type="date" id="s-fp" value="${a ? a.fp || '' : ''}"></div></div>
          <div class="fld"><label class="fld-lbl">Dates réelles</label><div style="display:flex;gap:8px"><input type="date" id="s-dr" value="${a ? a.dr || '' : ''}"><input type="date" id="s-fr" value="${a ? a.fr || '' : ''}"></div></div>
          <div style="display:flex;gap:10px">
            <div class="fld" style="flex:1"><label class="fld-lbl">Nb tâches</label><input type="number" id="s-nbt" value="${a ? a.nbt : 1}" min="1"></div>
            <div class="fld" style="flex:1"><label class="fld-lbl">Complétées</label><input type="number" id="s-tc" value="${a ? a.tc : 0}" min="0"></div>
          </div>
          <div id="s-prog-wrap" style="margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px"><span style="color:var(--text3)">Avancement calculé</span><span id="s-prog-val" style="font-weight:700;color:var(--accent2)">0%</span></div>
            <div class="prog-track prog-lg"><div class="prog-fill" id="s-prog-bar" style="width:0%;background:var(--accent)"></div></div>
          </div>
          <div style="display:flex;gap:10px">
            <div class="fld" style="flex:1"><label class="fld-lbl">Budget prévu (€)</label><input type="number" id="s-bprev" value="${a ? a.bprev : 0}" min="0"></div>

      </div>

      if (a) document.getElementById('s-prio').value = a.prio;

      function updateProg() {
        const nbt = parseInt(document.getElementById('s-nbt').value) || 1;
        const tc = Math.min(parseInt(document.getElementById('s-tc').value) || 0, nbt);
        const p = pct(tc, nbt);
        document.getElementById('s-statut').value = autoStatut(nbt, tc);
        document.getElementById('s-prog-val').textContent = p + '%';
        document.getElementById('s-prog-bar').style.width = p + '%';
        document.getElementById('s-prog-bar').style.background = p >= 80 ? 'var(--green)' : p >= 40 ? 'var(--yellow)' : 'var(--red)';
      }
      function updateBvar() {
        const bp = parseFloat(document.getElementById('s-bprev').value) || 0;
        const br = parseFloat(document.getElementById('s-breel').value) || 0;
        const v = bp - br;
        const el = document.getElementById('s-bvar');
        el.textContent = v >= 0 ? `✅ Économie: ${fe(v)}` : `⚠️ Dépassement: ${fe(Math.abs(v))}`;
        el.style.color = v >= 0 ? 'var(--green)' : 'var(--red)';
      }
      updateProg(); updateBvar();
      if (a) { document.getElementById('s-tc').value = Math.min(a.tc, a.nbt); updateProg(); }
      document.getElementById('s-nbt').addEventListener('input', updateProg);
      document.getElementById('s-tc').addEventListener('input', updateProg);
      document.getElementById('s-bprev').addEventListener('input', updateBvar);
      document.getElementById('s-breel').addEventListener('input', updateBvar);

        const nbt = parseInt(document.getElementById('s-nbt').value) || 1;
        const tc = Math.min(parseInt(document.getElementById('s-tc').value) || 0, nbt);
        const deps = document.getElementById('s-deps').value.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        const obj = {
          id: a ? a.id : maxId(DB.activites),
          pid: parseInt(document.getElementById('s-pid').value),
          nom, resp,
          prio: document.getElementById('s-prio').value,
          nbt, tc,
          bprev: parseFloat(document.getElementById('s-bprev').value) || 0,
          breel: parseFloat(document.getElementById('s-breel').value) || 0,
          statut: document.getElementById('s-statut').value,

          tags: document.getElementById('s-tags').value,
          deps, progress: pct(tc, nbt)
        };
        if (a) { const i = DB.activites.findIndex(x => x.id == a.id); if (i >= 0) DB.activites[i] = obj; }

        save(); selectedAct = null;

    function buildGantt(c) {
      c.innerHTML = `
  <div class="fbar">
    <select id="g-pid"><option value="">Tous projets</option>${DB.projets.map(p => `<option value="${p.id}">${p.nom}</option>`).join('')}</select>
    <select id="g-dt"><option value="prev">Dates prévues</option><option value="reel">Dates réelles</option></select>
    <select id="g-grp"><option value="all">Toutes activités</option><option value="cours">En cours</option><option value="retard">En retard</option></select>
    <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);cursor:pointer"><input type="checkbox" id="g-deps" style="width:auto"> Afficher dépendances</label>
  </div>
  <div class="gantt-wrap"><table class="gantt-table" id="gantt-tbl"></table></div>`;
      function draw() {
        const pid = document.getElementById('g-pid').value;
        const dt = document.getElementById('g-dt').value;
        const grp = document.getElementById('g-grp').value;
        let acts = DB.activites;
        if (pid) acts = acts.filter(a => a.pid == pid);
        if (grp === 'cours') acts = acts.filter(a => a.statut === 'En cours');
        if (grp === 'retard') acts = acts.filter(a => a.statut !== 'Terminée' && a.fp && new Date(a.fp) < TODAY);
        if (!acts.length) { document.getElementById('gantt-tbl').innerHTML = '<tr><td style="padding:20px;color:var(--text3)">Aucune activité</td></tr>'; return; }
        const dates = acts.map(a => [new Date((dt === 'reel' && a.dr ? a.dr : a.dp) || a.dp), new Date((dt === 'reel' && a.fr ? a.fr : a.fp) || a.fp)]).flat().filter(x => !isNaN(x));
        const minD = new Date(Math.min(...dates)); const maxD = new Date(Math.max(...dates));
        const totalDays = Math.max(1, Math.ceil((maxD - minD) / 86400000));
        const GANTT_W = 600;
        // Generate month headers
        const months = []; let cur = new Date(minD); cur.setDate(1);
        while (cur <= maxD) { months.push(new Date(cur)); cur.setMonth(cur.getMonth() + 1); }
        const monthCols = months.map(m => {
          const mStart = new Date(Math.max(m, minD)); const mEnd = new Date(Math.min(new Date(m.getFullYear(), m.getMonth() + 1, 0), maxD));
          const w = Math.round((mEnd - mStart) / 86400000 / totalDays * GANTT_W);
          return `<th colspan="1" style="width:${w}px;text-align:center">${m.toLocaleDateString('fr-FR', { month: 'short', year: '2-digit' })}</th>`;
        }).join('');
        // Today position
        const todayPct = Math.round((TODAY - minD) / 86400000 / totalDays * GANTT_W);
        let rows = acts.map(a => {
          const start = new Date((dt === 'reel' && a.dr ? a.dr : a.dp) || a.dp);
          const end = new Date((dt === 'reel' && a.fr ? a.fr : a.fp) || a.fp);
          if (isNaN(start) || isNaN(end)) return '';
          const left = Math.round((start - minD) / 86400000 / totalDays * GANTT_W);
          const width = Math.max(4, Math.round((end - start) / 86400000 / totalDays * GANTT_W));
          const progW = Math.round(width * pct(a.tc, a.nbt) / 100);
          const col = DB.projets.find(p => p.id == a.pid)?.couleur || '#6366F1';
          const isLate = a.statut !== 'Terminée' && a.fp && new Date(a.fp) < TODAY;
          return `<tr onclick="selectedAct=DB.activites.find(x=>x.id==${a.id});go('saisie')" title="${a.nom} | ${a.resp} | ${fd(a.dp)}→${fd(a.fp)}">
        <td style="min-width:160px;max-width:160px;overflow:hidden;text-overflow:ellipsis">
          <span class="badge ${statusColor(a.statut)}" style="margin-right:4px">${a.statut.charAt(0)}</span>
          <span style="font-weight:600;color:var(--text)">${a.nom}</span>
          ${isLate ? `<span class="badge b-red" style="margin-left:4px">⚠</span>` : ''}
        </td>
        <td style="width:70px;font-size:10.5px">${a.resp.split(' ')[0]}</td>
        <td style="width:${GANTT_W}px;position:relative;overflow:visible">
          <div style="position:relative;height:20px;width:${GANTT_W}px">
            ${todayPct >= 0 && todayPct <= GANTT_W ? `<div class="gantt-today-line" style="left:${todayPct}px"></div>` : ''}
            <div class="gantt-bar" style="position:absolute;left:${left}px;width:${width}px;background:${col}33;border:1px solid ${col}88">
              <div class="gantt-prog" style="width:${progW}px;background:${col}"></div>
              ${width > 30 ? `<span style="position:absolute;left:4px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;max-width:${width - 8}px">${pct(a.tc, a.nbt)}%</span>` : ''}
            </div>
          </div>
        </td>
      </tr>`;
        }).filter(Boolean);
        document.getElementById('gantt-tbl').innerHTML = `
      <thead><tr><th style="min-width:160px">Activité</th><th style="width:70px">Resp.</th><th style="width:${GANTT_W}px">${monthCols}</th></tr></thead>
      <tbody>${rows.join('')}</tbody>`;
      }
      draw();
      ['g-pid', 'g-dt', 'g-grp', 'g-deps'].forEach(id => document.getElementById(id).addEventListener('change', draw));
    }

    // PAGE KANBAN (inchangée)

    function buildKanban(c) {
      const cols = [

    <div class="card"><div class="card-head"><span class="card-title">Priorités</span></div><div class="card-body chart-container" style="height:260px"><canvas id="ch-prio" role="img" aria-label="Graphique camembert des priorités"></canvas></div></div>

  </div>`;

      function refresh() {
        const pid = document.getElementById('tb-pid').value;
        sessionStorage.setItem('tb-pid', pid);
        let data = DB.activites; if (pid) data = data.filter(a => a.pid == pid);
        const total = data.length, termine = data.filter(a => a.statut === 'Terminée').length;
        const bprev = data.reduce((s, a) => s + (a.bprev || 0), 0), breel = data.reduce((s, a) => s + (a.breel || 0), 0);
        const av = total ? Math.round(data.reduce((s, a) => s + pct(a.tc, a.nbt), 0) / total) : 0;
        const ret = data.filter(a => a.statut !== 'Terminée' && a.fp && new Date(a.fp) < TODAY).length;
        document.getElementById('tb-kpi').innerHTML = `
      <div class="stat"><div class="stat-ico" style="background:var(--accentbg);color:var(--accent2)"><i class="fas fa-tasks"></i></div><div><div class="stat-val">${total}</div><div class="stat-lbl">Activités</div></div></div>
      <div class="stat"><div class="stat-ico" style="background:var(--greenbg);color:var(--green)"><i class="fas fa-check"></i></div><div><div class="stat-val">${av}%</div><div class="stat-lbl">Avancement moyen</div></div></div>
      <div class="stat"><div class="stat-ico" style="background:var(--bluebg);color:var(--blue)"><i class="fas fa-coins"></i></div><div><div class="stat-val">${pct(breel, bprev)}%</div><div class="stat-lbl">Budget exécuté</div></div></div>
      <div class="stat"><div class="stat-ico" style="background:${ret > 0 ? 'var(--redbg)' : 'var(--greenbg)'};color:${ret > 0 ? 'var(--red)' : 'var(--green)'}"><i class="fas fa-clock"></i></div><div><div class="stat-val" style="color:${ret > 0 ? 'var(--red)' : 'var(--green)'}">${ret}</div><div class="stat-lbl">En retard</div></div></div>`;
        // Chart.js charts
        const CC = window.Chart;
        if (!CC) return;
        const isDark = !document.body.classList.contains('light');
        const tc = isDark ? 'rgba(226,232,240,0.7)' : 'rgba(30,41,59,0.7)';
        const gc = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
        const statCounts = { 'Non démarrée': 0, 'En cours': 0, 'Terminée': 0, 'Suspendue': 0 };
        data.forEach(a => statCounts[a.statut]++);
        const prioCounts = { 'Faible': 0, 'Moyenne': 0, 'Élevée': 0, 'Critique': 0 };
        data.forEach(a => prioCounts[a.prio]++);
        ['ch-statut', 'ch-prio', 'ch-budget', 'ch-av'].forEach(id => {
          const canvas = document.getElementById(id);
          if (canvas && canvas._chart) { canvas._chart.destroy(); }
        });
        const cs = document.getElementById('ch-statut');
        cs._chart = new CC(cs, { type: 'bar', data: { labels: Object.keys(statCounts), datasets: [{ label: 'Activités', data: Object.values(statCounts), backgroundColor: ['#EF444455', '#3B82F655', '#10B98155', '#F59E0B55'], borderColor: ['#EF4444', '#3B82F6', '#10B981', '#F59E0B'], borderWidth: 2, borderRadius: 6 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { color: tc, stepSize: 1 }, grid: { color: gc } }, x: { ticks: { color: tc }, grid: { display: false } } } } });
        const cp = document.getElementById('ch-prio');
        cp._chart = new CC(cp, { type: 'doughnut', data: { labels: Object.keys(prioCounts).filter(k => prioCounts[k] > 0), datasets: [{ data: Object.keys(prioCounts).filter(k => prioCounts[k] > 0).map(k => prioCounts[k]), backgroundColor: ['#94A3B855', '#3B82F655', '#F59E0B55', '#EF444455'], borderColor: ['#94A3B8', '#3B82F6', '#F59E0B', '#EF4444'], borderWidth: 2 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
        const projs = DB.projets.filter(p => !pid || p.id == pid);
        const cb = document.getElementById('ch-budget');
        cb._chart = new CC(cb, { type: 'bar', data: { labels: projs.map(p => p.nom.slice(0, 18)), datasets: [{ label: 'Prévu', data: projs.map(p => DB.activites.filter(a => a.pid == p.id).reduce((s, a) => s + (a.bprev || 0), 0)), backgroundColor: '#6366F155', borderColor: '#6366F1', borderWidth: 2, borderRadius: 4 }, { label: 'Réel', data: projs.map(p => DB.activites.filter(a => a.pid == p.id).reduce((s, a) => s + (a.breel || 0), 0)), backgroundColor: '#F59E0B55', borderColor: '#F59E0B', borderWidth: 2, borderRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { color: tc, callback: v => v >= 1000 ? (v / 1000) + 'k€' : v + '€' }, grid: { color: gc } }, x: { ticks: { color: tc }, grid: { display: false } } } } });
        const top8 = data.map(a => ({ nom: a.nom.slice(0, 20), av: pct(a.tc, a.nbt) })).sort((a, b) => b.av - a.av).slice(0, 8);
        const ca = document.getElementById('ch-av');
        ca._chart = new CC(ca, { type: 'bar', data: { labels: top8.map(x => x.nom), datasets: [{ label: 'Avancement', data: top8.map(x => x.av), backgroundColor: top8.map(x => x.av >= 80 ? '#10B98155' : x.av >= 40 ? '#F59E0B55' : '#EF444455'), borderColor: top8.map(x => x.av >= 80 ? '#10B981' : x.av >= 40 ? '#F59E0B' : '#EF4444'), borderWidth: 2, borderRadius: 4 }] }, options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { min: 0, max: 100, ticks: { color: tc, callback: v => v + '%' }, grid: { color: gc } }, y: { ticks: { color: tc, font: { size: 10 } }, grid: { display: false } } } } });
      }
      setTimeout(() => {
        const s = document.createElement('script'); s.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js';
        s.onload = () => refresh();
        if (window.Chart) refresh(); else document.head.appendChild(s);
      }, 50);
      document.getElementById('tb-pid').addEventListener('change', refresh);
    }

    function buildBudget(c) {
      c.innerHTML = `
  <div class="fbar">

      ${DB.projets.map(p => `<option value="${p.id}">${p.nom}</option>`).join('')}

      function refresh() {
        const pidVal = document.getElementById('budget-filter-pid').value;
        const pid = pidVal ? parseInt(pidVal) : null;
        let projList = DB.projets;
        if (pid) projList = projList.filter(p => p.id === pid);

        const projData = projList.map(p => {
          const acts = DB.activites.filter(a => a.pid == p.id);
          const bp = acts.reduce((s, a) => s + (a.bprev || 0), 0);
          const br = acts.reduce((s, a) => s + (a.breel || 0), 0);
          return { ...p, bp, br, ecart: bp - br, taux: pct(br, bp) };
        });
        const totBP = projData.reduce((s, p) => s + p.bp, 0);
        const totBR = projData.reduce((s, p) => s + p.br, 0);

        document.getElementById('budget-kpi').innerHTML = `
      <div class="stat"><div class="stat-ico" style="background:var(--accentbg);color:var(--accent2)"><i class="fas fa-coins"></i></div><div><div class="stat-val">${fe(totBP)}</div><div class="stat-lbl">Budget prévu</div></div></div>
      <div class="stat"><div class="stat-ico" style="background:var(--yellowbg);color:var(--yellow)"><i class="fas fa-money-bill-wave"></i></div><div><div class="stat-val">${fe(totBR)}</div><div class="stat-lbl">Total dépensé</div></div></div>
      <div class="stat"><div class="stat-ico" style="background:${totBP - totBR >= 0 ? 'var(--greenbg)' : 'var(--redbg)'};color:${totBP - totBR >= 0 ? 'var(--green)' : 'var(--red)'}"><i class="fas fa-${totBP - totBR >= 0 ? 'piggy-bank' : 'exclamation-triangle'}"></i></div><div><div class="stat-val" style="color:${totBP - totBR >= 0 ? 'var(--green)' : 'var(--red)'}">${totBP - totBR >= 0 ? '-' : '+'}${fe(Math.abs(totBP - totBR))}</div><div class="stat-lbl">${totBP - totBR >= 0 ? 'Économies' : 'Dépassement'}</div></div></div>
      <div class="stat"><div class="stat-ico" style="background:var(--bluebg);color:var(--blue)"><i class="fas fa-percentage"></i></div><div><div class="stat-val">${pct(totBR, totBP)}%</div><div class="stat-lbl">Taux d'exécution</div></div></div>`;

        document.getElementById('budget-projets').innerHTML = `
      <div class="card-head"><span class="card-title">Suivi budgétaire par projet</span></div>
      <div class="card-body">
        ${projData.map(p => `<div style="margin-bottom:18px;padding:12px;background:var(--bg3);border-radius:10px;border-left:4px solid ${p.couleur}">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <span style="font-weight:700;font-size:13px">${p.nom}</span>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="badge ${p.taux > 100 ? 'b-red' : p.taux >= 80 ? 'b-green' : 'b-blue'}">${p.taux}% exécuté</span>
              <span style="font-size:10.5px;color:var(--text3)">${fe(p.br)} / ${fe(p.bp)}</span>
            </div>
          </div>
          <div class="prog-track prog-lg" style="margin-bottom:8px"><div class="prog-fill" style="width:${Math.min(p.taux, 100)}%;background:${p.taux > 100 ? 'var(--red)' : p.taux >= 80 ? 'var(--green)' : p.couleur}"></div></div>
          <div style="display:flex;gap:20px;font-size:11px">
            <span style="color:var(--text3)">Prévu: <strong style="color:var(--text)">${fe(p.bp)}</strong></span>
            <span style="color:var(--text3)">Réel: <strong style="color:var(--text)">${fe(p.br)}</strong></span>
            <span style="color:var(--text3)">Solde: <strong style="color:${p.ecart >= 0 ? 'var(--green)' : 'var(--red)'}">${p.ecart >= 0 ? '+' : ''} ${fe(p.ecart)}</strong></span>
          </div>
        </div>`).join('')}
      </div>`;

        const allActs = pid ? DB.activites.filter(a => a.pid === pid) : DB.activites;
        const topActs = allActs.filter(a => a.breel > 0).sort((a, b) => b.breel - a.breel).slice(0, 10);
        document.getElementById('budget-top10').innerHTML = `
      <div class="card-head"><span class="card-title">Top 10 activités — Budget réel</span></div>
      <div class="card-body">
        ${topActs.map(a => `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <span style="min-width:120px;font-size:12px;color:var(--text)">${a.nom}</span>
          <div class="prog-track" style="flex:1"><div class="prog-fill" style="width:${pct(a.breel, allActs.reduce((s, x) => s + (x.breel || 0), 0))}%;background:${DB.projets.find(p => p.id == a.pid)?.couleur || '#6366F1'}"></div></div>
          <span style="font-size:11px;font-weight:700;color:var(--text);min-width:80px;text-align:right">${fe(a.breel)}</span>
          <span style="font-size:10px;color:var(--text3);min-width:80px;text-align:right">${pct(a.breel, a.bprev)}% prévu</span>
        </div>`).join('')}
      </div>`;
      }

      document.getElementById('budget-filter-pid').addEventListener('change', refresh);
      refresh();
    }

    // ============================
    // PAGE DOCUMENTS (inchangée)
    // ============================
    function buildDocs(c) {
      c.innerHTML = `
  <div class="section-head">
    <div class="section-title">Documents & Rapports</div>
  </div>

  <!-- Formulaire d'ajout -->
  <div class="card" style="margin-bottom:20px">
    <div class="card-head"><span class="card-title"><i class="fas fa-upload" style="margin-right:6px;color:var(--accent2)"></i>Ajouter un document</span></div>
    <div class="card-body">
      <div class="g2">
        <div>
          <div class="fld"><label class="fld-lbl">Titre *</label><input id="doc-nom" placeholder="Nom du document"></div>
          <div class="fld"><label class="fld-lbl">Projet *</label>
            <select id="doc-pid" style="width:100%">
              <option value="">Sélectionner un projet</option>
              ${DB.projets.map(p => `<option value="${p.id}">${p.nom}</option>`).join('')}
            </select>
          </div>
          <div class="fld"><label class="fld-lbl">Activité</label>
            <select id="doc-aid" style="width:100%">
              <option value="">Aucune (document général)</option>
            </select>
          </div>
          <div class="fld"><label class="fld-lbl">Date</label><input type="date" id="doc-date" value="${new Date().toISOString().slice(0, 10)}"></div>
        </div>
        <div>
          <div class="fld"><label class="fld-lbl">Description (optionnelle)</label>
            <textarea id="doc-desc" rows="3" placeholder="Brève description du document..."></textarea>
          </div>
          <div class="fld"><label class="fld-lbl">Fichier *</label>
            <input type="file" id="doc-file" accept="*/*" style="padding:6px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);width:100%">
          </div>
          <div style="margin-top:12px">
            <button class="btn btn-primary" onclick="saveDocument()"><i class="fas fa-save"></i> Enregistrer</button>
            <button class="btn btn-ghost" onclick="document.getElementById('doc-nom').value='';document.getElementById('doc-desc').value='';document.getElementById('doc-file').value=''">Réinitialiser</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Filtres et liste -->
  <div class="fbar">
    <select id="doc-filter-pid"><option value="">Tous projets</option>${DB.projets.map(p => `<option value="${p.id}">${p.nom}</option>`).join('')}</select>
    <select id="doc-filter-aid"><option value="">Toutes activités</option></select>
    <select id="doc-filter-type"><option value="">Tous types</option><option value="image">Images</option><option value="document">Documents (non image)</option></select>
    <button class="btn btn-ghost btn-sm" onclick="buildDocs(document.getElementById('page-docs'))"><i class="fas fa-refresh"></i> Rafraîchir</button>
    <span style="font-size:11px;color:var(--text3);margin-left:auto">${DB.documents.length} document(s)</span>
  </div>

  <div class="card">
    <div class="card-head"><span class="card-title">Liste des documents</span></div>
    <div class="card-body" id="doc-list">
      ${renderDocList()}
    </div>
  </div>
  `;

      const pidSelect = document.getElementById('doc-pid');
      const aidSelect = document.getElementById('doc-aid');
      pidSelect.addEventListener('change', function () {
        const pid = parseInt(this.value);
        aidSelect.innerHTML = '<option value="">Aucune (document général)</option>';
        if (pid) {
          const acts = DB.activites.filter(a => a.pid === pid);
          acts.forEach(a => { aidSelect.innerHTML += `<option value="${a.id}">${a.nom}</option>`; });
        }
      });
      const filterPid = document.getElementById('doc-filter-pid');
      const filterAid = document.getElementById('doc-filter-aid');
      filterPid.addEventListener('change', function () {
        const pid = parseInt(this.value);
        filterAid.innerHTML = '<option value="">Toutes activités</option>';
        if (pid) {
          const acts = DB.activites.filter(a => a.pid === pid);
          acts.forEach(a => { filterAid.innerHTML += `<option value="${a.id}">${a.nom}</option>`; });
        }
        document.getElementById('doc-list').innerHTML = renderDocList();
      });
      filterPid.dispatchEvent(new Event('change'));
      document.getElementById('doc-filter-aid').addEventListener('change', () => document.getElementById('doc-list').innerHTML = renderDocList());
      document.getElementById('doc-filter-type').addEventListener('change', () => document.getElementById('doc-list').innerHTML = renderDocList());
    }

    function renderDocList() {
      const filterPid = document.getElementById('doc-filter-pid');
      const filterAid = document.getElementById('doc-filter-aid');
      const filterType = document.getElementById('doc-filter-type');
      const pid = filterPid ? parseInt(filterPid.value) : 0;
      const aid = filterAid ? parseInt(filterAid.value) : 0;
      const type = filterType ? filterType.value : '';
      let docs = DB.documents;
      if (pid) docs = docs.filter(d => d.projetId === pid);
      if (aid) docs = docs.filter(d => d.activiteId === aid);
      if (type === 'image') docs = docs.filter(d => d.fileType && d.fileType.startsWith('image/'));
      if (type === 'document') docs = docs.filter(d => d.fileType && !d.fileType.startsWith('image/'));
      if (!docs.length) return '<div class="empty"><i class="fas fa-file-alt"></i>Aucun document correspondant</div>';

      return docs.map(d => {
        const isImage = d.fileType && d.fileType.startsWith('image/');
        return `
    <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg3);border-radius:8px;margin-bottom:8px;border-left:3px solid ${isImage ? 'var(--purple)' : 'var(--blue)'}">
      ${isImage && d.fileData ? `<img src="data:${d.fileType};base64,${d.fileData}" class="doc-preview" alt="Aperçu">` : `<i class="fas ${isImage ? 'fa-image' : 'fa-file-lines'}" style="color:${isImage ? 'var(--purple)' : 'var(--blue)'};font-size:24px;width:30px;text-align:center"></i>`}
      <div style="flex:1">
        <div style="font-weight:600;font-size:12.5px">${d.nom}</div>
        <div style="font-size:11px;color:var(--text3)">
          ${d.projet} ${d.activite ? '· ' + d.activite : ''} · ${d.date ? fd(d.date) : '—'} · 
          <span class="badge ${isImage ? 'b-purple' : 'b-blue'}" style="font-size:9px">${isImage ? 'Image' : 'Document'}</span>
          ${d.description ? ` · ${d.description}` : ''}
        </div>
        ${d.fileName ? `<div style="font-size:10px;color:var(--text2);margin-top:3px"><i class="fas fa-paperclip"></i> ${d.fileName}</div>` : ''}
      </div>
      <div style="display:flex;gap:6px">
        ${d.fileData ? `<button class="btn btn-ghost btn-sm" onclick="downloadDoc(${d.id})"><i class="fas fa-download"></i></button>` : ''}
        <button class="btn btn-danger btn-sm" onclick="deleteDoc(${d.id})"><i class="fas fa-trash"></i></button>
      </div>
    </div>`;
      }).join('');
    }

    function saveDocument() {
      const nom = document.getElementById('doc-nom').value.trim();
      const pid = parseInt(document.getElementById('doc-pid').value);
      const aid = parseInt(document.getElementById('doc-aid').value) || null;
      const date = document.getElementById('doc-date').value;
      const description = document.getElementById('doc-desc').value.trim();
      const fileInput = document.getElementById('doc-file');
      const file = fileInput.files[0];
      if (!nom) { notify('Veuillez saisir un titre', 'error'); return; }
      if (!pid) { notify('Veuillez sélectionner un projet', 'error'); return; }
      if (!file) { notify('Veuillez sélectionner un fichier', 'error'); return; }
      const reader = new FileReader();
      reader.onload = function (e) {
        const base64 = e.target.result.split(',')[1];
        const projet = pName(pid);
        const activite = aid ? DB.activites.find(a => a.id === aid)?.nom : null;
        const doc = {
          id: maxId(DB.documents), nom, description, projet, projetId: pid,
          activite: activite || '', activiteId: aid, date, fileName: file.name,
          fileType: file.type, fileData: base64
        };
        DB.documents.push(doc);
        save();
        notify('Document enregistré', 'success');
        document.getElementById('doc-nom').value = '';
        document.getElementById('doc-desc').value = '';
        document.getElementById('doc-file').value = '';
        document.getElementById('doc-date').value = new Date().toISOString().slice(0, 10);
        document.getElementById('doc-list').innerHTML = renderDocList();
      };
      reader.onerror = () => notify('Erreur lors de la lecture du fichier', 'error');
      reader.readAsDataURL(file);
    }

    function deleteDoc(id) {
      if (!confirm('Supprimer ce document ?')) return;
      DB.documents = DB.documents.filter(d => d.id !== id);
      save();
      notify('Document supprimé', 'error');
      document.getElementById('doc-list').innerHTML = renderDocList();
    }

    function downloadDoc(id) {
      const doc = DB.documents.find(d => d.id === id);
      if (!doc || !doc.fileData) { notify('Fichier non disponible', 'error'); return; }
      const link = document.createElement('a');
      link.href = `data:${doc.fileType};base64,${doc.fileData}`;
      link.download = doc.fileName || 'document';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // ============================
    // THEME (corrigé)
    // ============================
    document.getElementById('theme-sel').addEventListener('change', function () {
      document.body.className = this.value === 'light' ? 'light' : '';
      localStorage.setItem('ong_pro_theme', this.value);
      if (cur === 'tableau') buildTableau(document.getElementById('page-tableau'));
    });
    const th = localStorage.getItem('ong_pro_theme') || 'dark';
    document.body.className = th === 'light' ? 'light' : '';
    document.getElementById('theme-sel').value = th;

    // ============================
    // GLOBAL KEY SHORTCUTS
    // ============================
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
      if (e.altKey && e.key === 'n') { selectedAct = null; go('saisie') }
      if (e.altKey && e.key === 'b') go('bdd');
      if (e.altKey && e.key === 'g') go('gantt');
      if (e.altKey && e.key === 'a') go('alertes');
    });

    // ============================
    // NAVIGATION EVENTS
    // ============================
    document.querySelectorAll('.nav-btn[data-p]').forEach(b => b.addEventListener('click', function () { go(this.dataset.p) }));
    document.getElementById('modal-overlay').addEventListener('click', function (e) { if (e.target === this) closeModal() });

    // ============================
    // INIT
    // ============================
    go('accueil');
  </script>
</body>

</html>
